name: Python Plugin CI

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version"
        type: string
        default: "3.12"
      run_tier2:
        description: "Run Tier 2"
        type: boolean
        default: false
      run_tier3:
        description: "Run Tier 3"
        type: boolean
        default: true
      coverage_threshold:
        description: "Coverage threshold"
        type: number
        default: 50
      auto_merge_on_pass:
        description: "Auto merge"
        type: boolean
        default: false

    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  lint:
    name: "Tier 1 - Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hello
        run: echo "CI pipeline is working"
