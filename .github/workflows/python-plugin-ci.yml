name: Python Plugin CI

on:
  workflow_call:
    inputs:
      run_tier2:
        description: "Run Tier 2 integration tests (requires testcontainers)"
        type: boolean
        default: false
      run_tier3:
        description: "Run Tier 3 security scans"
        type: boolean
        default: true
      python_version:
        description: "Python version to use"
        type: string
        default: "3.12"
      coverage_threshold:
        description: "Minimum code coverage percentage to pass"
        type: number
        default: 25
      auto_merge_on_pass:
        description: "Automatically merge if all checks pass (for Paperclip PRs)"
        type: boolean
        default: false

    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  lint:
    name: "Tier 1 - Lint and Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

      - name: Run type checking if configured
        run: |
          if [ -f "pyproject.toml" ] && grep -q "mypy" pyproject.toml; then
            mypy app/ --ignore-missing-imports
          else
            echo "Skipping mypy - not configured in pyproject.toml"
          fi

  secret-scan:
    name: "Tier 1 - Secret Detection"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: "Tier 1 - Dependency Vulnerability Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install dependencies
        run: |
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --strict --desc on 2>&1 | tee audit-report.txt

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: audit-report.txt

  unit-tests:
    name: "Tier 1 - Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ -f "requirements-dev.txt" ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Run unit tests
        env:
          USE_TESTCONTAINERS: "false"
          SQS_ENABLED: "false"
        run: |
          pytest tests/unit -v \
            --cov=app \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            -m "unit" \
            --tb=short \
            --strict-markers

      - name: Upload unit test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml

  integration-tests:
    name: "Tier 2 - Integration Tests"
    if: ${{ inputs.run_tier2 }}
    needs: [unit-tests]
    runs-on: ubuntu-latest
    # 35 min was too tight once performance/nightly tests leaked in.
    # With those excluded the suite runs in ~8-10 min; 20 min is ample headroom.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ -f "requirements-dev.txt" ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Run integration tests
        env:
          USE_TESTCONTAINERS: "true"
          SQS_ENABLED: "false"
          JWT_SECRET: "ci-test-secret-not-for-production"
          AWS_ACCESS_KEY_ID: "testing"
          AWS_SECRET_ACCESS_KEY: "testing"
          AWS_DEFAULT_REGION: "us-east-1"
        run: |
          # Explicitly exclude nightly/performance tests so the -m flag does not
          # override pyproject.toml addopts and accidentally pull in the 100k-user
          # seed fixture that causes the PostgreSQL testcontainer to OOM.
          # See AUT-1486 for the full incident analysis.
          pytest tests/api tests/integration -v \
            --cov=app \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing \
            -m "(api or integration) and not performance and not nightly" \
            --tb=short \
            --strict-markers \
            --timeout=180 \
            --timeout-method=thread

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.xml

  sast-scan:
    name: "Tier 3 - Static Security Analysis"
    if: ${{ inputs.run_tier3 }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r app/ -ll --exclude tests/

  container-scan:
    name: "Tier 3 - Container Image Scan"
    if: ${{ inputs.run_tier3 }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: check
        run: |
          if [ -f "Dockerfile" ]; then
            echo "has_dockerfile=true" >> $GITHUB_OUTPUT
          else
            echo "has_dockerfile=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image for scanning
        if: steps.check.outputs.has_dockerfile == 'true'
        run: docker build -t scan-target:latest .

      - name: Run Trivy vulnerability scanner
        if: steps.check.outputs.has_dockerfile == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "scan-target:latest"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

  coverage-gate:
    name: "Coverage Gate"
    needs: [unit-tests]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - name: Check coverage threshold
        run: |
          pip install coverage
          COVERAGE=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage-unit.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0))
          print(round(rate * 100, 1))
          ")
          echo "Coverage: ${COVERAGE}%"
          echo "Threshold: ${{ inputs.coverage_threshold }}%"
          threshold=${{ inputs.coverage_threshold }}
          if [ "$(echo "$COVERAGE < $threshold" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${threshold}%"
            exit 1
          fi

  auto-merge:
    name: "Auto-Merge (Paperclip PRs)"
    # continue-on-error prevents auto-merge failures from failing the overall
    # CI status check, avoiding a circular dependency with branch protection.
    continue-on-error: true
    if: >-
      inputs.auto_merge_on_pass &&
      github.event_name == 'pull_request' &&
      (
        github.actor == 'Paperclip-Paperclip' ||
        github.actor == 'automateprojectsai' ||
        contains(github.event.pull_request.labels.*.name, 'auto-merge')
      )
    needs: [lint, secret-scan, dependency-audit, unit-tests, coverage-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });
            console.log('Auto-merge triggered for Paperclip PR');
